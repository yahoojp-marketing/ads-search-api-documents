AdGroupAdServiceRequiredAssets:
  type: string
  nullable: true
  enum:
    - ENOUGH
    - NOT_ENOUGH
    - UNKNOWN
  title: AdGroupAdServiceRequiredAssets
  description: |
    <div lang="ja">レスポンシブ検索広告に必要なアセット数を満たしているかを表します。<br>
    このフィールドは、リクエストの際には無視されます。<br>
    ※現在利用できません。</div>
    <div lang="en">Required number of assets for responsive search ads<br>
    This field will be ignored on input.<br>
    * Not Available.</div>
    <dl class=term>
      <dt class="term__item">ENOUGH</dt>
      <dd class="term__desc"><span lang="ja">十分なアセット数です。 ※現在利用できません。</span><span lang="en">Sufficient number of assets. *Not Available.</span></dd>
      <dt class="term__item">NOT_ENOUGH</dt>
      <dd class="term__desc"><span lang="ja">アセット数が不足しています。 ※現在利用できません。</span><span lang="en">Insufficient number of assets. *Not Available.</span></dd>
      <dt class="term__item">UNKNOWN</dt>
      <dd class="term__desc"><span lang="ja">未知の値です。</span><span lang="en">Unknown value.</span></dd>
    </dl>
