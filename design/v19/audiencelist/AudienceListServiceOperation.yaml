AudienceListServiceOperation:
  type: object
  nullable: true
  required:
  - accountId
  - operand
  properties:
    accountId:
      type: integer
      nullable: false
      format: int64
      description: |
        <div lang="ja">アカウントIDです。</div>
        <div lang="en">Account ID.</div>
    operand:
      type: array
      nullable: true
      items:
        $ref: 'AudienceListServiceAudienceList.yaml#/AudienceListServiceAudienceList'
      minItems: 1
      maxItems: 200
    audienceListOwner:
      $ref: 'AudienceListServiceAudienceListOwner.yaml#/AudienceListServiceAudienceListOwner'
  title: AudienceListServiceOperation
  description: |
    <div lang="ja">AudienceListServiceOperationは、操作対象のオーディエンスリストを保持するオブジェクトです。</div>
    <div lang="en">AudienceListServiceOperation is an object that holds audience audience.</div>
