CampaignAudienceListServiceOperation:
  type: object
  nullable: true
  required:
  - accountId
  - operand
  properties:
    accountId:
      type: integer
      nullable: false
      format: int64
      description: |
        <div lang="ja">アカウントIDです。</div>
        <div lang="en">Account ID.</div>
    operand:
      type: array
      nullable: true
      items:
        $ref: 'CampaignAudienceList.yaml#/CampaignAudienceList'
      minItems: 1
      maxItems: 1000
  title: CampaignAudienceListServiceOperation
  description: |
    <div lang="ja">CampaignAudienceListServiceOperationオブジェクトは、操作対象となるキャンペーン階層のオーディエンスリスト設定情報を保持します。</div>
    <div lang="en">CampaignAudienceListServiceOperation object holds the setting information of audience list on campaign level to be object.</div>
