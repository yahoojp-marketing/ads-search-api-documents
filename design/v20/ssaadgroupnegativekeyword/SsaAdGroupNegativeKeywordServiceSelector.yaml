SsaAdGroupNegativeKeywordServiceSelector:
  type: object
  nullable: true
  required:
    - accountId
  properties:
    accountId:
      type: integer
      nullable: false
      format: int64
      description: |
        <div lang="ja">検索条件：アカウントID</div>
        <div lang="en">Search condition: Account ID.</div>
    adGroupIds:
      type: array
      nullable: true
      items:
        type: integer
        nullable: true
        format: int64
      maxItems: 1000
      description: |
        <div lang="ja">検索条件：広告グループID</div>
        <div lang="en">Search condition: Ad group ID.</div>
    campaignIds:
      type: array
      nullable: true
      items:
        type: integer
        nullable: true
        format: int64
      maxItems: 1000
      description: |
        <div lang="ja">検索条件：キャンペーンID</div>
        <div lang="en">Search condition: Campaign ID.</div>
    criterionIds:
      type: array
      nullable: true
      items:
        type: integer
        nullable: true
        format: int64
      maxItems: 1000
      description: |
        <div lang="ja">検索条件：クライテリアID<br>
        指定しない場合は、広告グループID配下のすべての対象外キーワードが返却されます。</div>
        <div lang="en">Search condition: Criterion ID.<br>
        If omitted, all negative keywords under the ad group ID are returned.</div>
    numberResults:
      type: integer
      nullable: true
      format: int32
      minimum: 1
      maximum: 10000
      default: 500
      description: |
        <div lang="ja">開始位置から取得する結果の数。このフィールドは、1以上を指定する必要があります。</div>
        <div lang="en">The number of results to retrieve starting from the initial position. This field must be greater than or equal to 1.</div>
    startIndex:
      type: integer
      nullable: true
      format: int32
      minimum: 1
      default: 1
      description: |
        <div lang="ja">取得を開始する結果セット内の位置。このフィールドは、1以上を指定する必要があります。</div>
        <div lang="en">The position within the result set where retrieval begins. This field must be greater than or equal to 1.</div>
  title: SsaAdGroupNegativeKeywordServiceSelector
  description: |
    <div lang="ja">SsaAdGroupNegativeKeywordServiceSelectorオブジェクトは、SSA広告グループの対象外キーワードの検索条件を表します。</div>
    <div lang="en">SsaAdGroupNegativeKeywordServiceSelector object describes search conditions of negative keywords in SSA ad group-level.</div>
