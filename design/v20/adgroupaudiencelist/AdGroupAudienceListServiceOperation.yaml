      type: integer
      nullable: false
      format: int64
      description: |
        <div lang="ja">アカウントIDです。</div>
        <div lang="en">Account ID.</div>
    operand:
      type: array
      nullable: true
      items:
        $ref: 'AdGroupAudienceList.yaml#/AdGroupAudienceList'
      minItems: 1
      maxItems: 1000
  title: AdGroupAudienceListServiceOperation
  description: |
    <div lang="ja">AdGroupAudienceListServiceOperationは、操作対象の広告グループレベルでのオーディエンスリスト設定を保持するオブジェクトです。</div>
    <div lang="en">AdGroupAudienceListServiceOperation is an object that holds target ad group retargeting.</div>
