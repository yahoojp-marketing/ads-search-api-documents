SsaCampaignNegativeKeywordServiceOperation:
  type: object
  nullable: true
  required:
  - accountId
  - operand
  properties:
    accountId:
      type: integer
      nullable: false
      format: int64
      description: |
        <div lang="ja">アカウントIDです。</div>
        <div lang="en">Account ID.</div>
    campaignId:
      type: integer
      nullable: true
      format: int64
      description: |
        <div lang="ja">キャンペーンIDです。</div>
        <div lang="en">Campaign ID.</div>
    operand:
      type: array
      nullable: true
      items:
        $ref: 'SsaCampaignNegativeKeyword.yaml#/SsaCampaignNegativeKeyword'
      minItems: 1
      maxItems: 200
  title: SsaCampaignNegativeKeywordServiceOperation
  description: |
    <div lang="ja">SsaCampaignNegativeKeywordServiceOperationオブジェクトは、操作の対象となるキャンペーンの対象外キーワードと処理の内容を表します。</div>
    <div lang="en">SsaCampaignNegativeKeywordServiceOperation object describes campaign negative keywords for operation and list of operations.</div>
