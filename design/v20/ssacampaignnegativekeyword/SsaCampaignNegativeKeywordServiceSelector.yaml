SsaCampaignNegativeKeywordServiceSelector:
  type: object
  nullable: true
  required:
  - accountId
  properties:
    accountId:
      type: integer
      nullable: false
      format: int64
      description: |
        <div lang="ja">アカウントIDです。</div>
        <div lang="en">Account ID.</div>
    campaignIds:
      type: array
      nullable: true
      items:
        type: integer
        nullable: true
        format: int64
      maxItems: 500
      description: |
        <div lang="ja">キャンペーンIDの配列です。</div>
        <div lang="en">Campaign ID array.</div>
    criterionIds:
      type: array
      nullable: true
      items:
        type: integer
        nullable: true
        format: int64
      maxItems: 500
      description: |
        <div lang="ja">クライテリオンIDの配列です。<br>
        指定しない場合は、キャンペーンID以下のすべての対象外キーワードが含まれます。</div>
        <div lang="en">Criterion ID array.<br>
        If no criterionIds, all negative keywords under the campaign ID are returned.</div>
    numberResults:
      type: integer
      nullable: true
      format: int32
      minimum: 1
      maximum: 10000
      default: 500
      description: |
        <div lang="ja">開始位置から取得する結果の数。このフィールドは、1以上を指定する必要があります。</div>
        <div lang="en">The number of results to retrieve starting from the initial position. This field must be greater than or equal to 1.</div>
    startIndex:
      type: integer
      nullable: true
      format: int32
      minimum: 1
      default: 1
      description: |
        <div lang="ja">取得を開始する結果セット内の位置。このフィールドは、1以上を指定する必要があります。</div>
        <div lang="en">The position within the result set where retrieval begins. This field must be greater than or equal to 1.</div>
  title: SsaCampaignNegativeKeywordServiceSelector
  description: |
    <div lang="ja">SsaCampaignNegativeKeywordServiceSelectorオブジェクトは、操作の対象となるキャンペーンの対象外キーワードを表します。</div>
    <div lang="en">SsaCampaignNegativeKeywordServiceSelector object describes campaign negative keywords for operation.</div>
