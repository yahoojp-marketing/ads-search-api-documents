SsaAdGroupServiceCpcBiddingScheme:
  type: object
  nullable: true
  properties:
    cpc:
      type: integer
      nullable: true
      format: int64
      description: |
        <div lang="ja">
        広告グループ最大入札価格（CPC）です。<br>
        ADDおよびSET時、このフィールドは省略可能となります。ADD時のデフォルト設定値は5となります。<br>
        広告グループ入札価格は削除できません。<br>
        ※自動入札を設定している場合でも広告グループ入札価格が適用される場合があります。
        </div>
        <div lang="en">
        Max bid of ad group (CPC).<br>
        This field is optional in ADD and SET operation. The default value in ADD operation will be 5.<br>
        Ad group bids cannot be removed.<br>
        *Ad group bids may apply even when autobidding is in use.
        </div>
  title: SsaAdGroupServiceCpcBiddingScheme
  description: |
    <div lang="ja">
    SsaAdGroupServiceCpcBiddingSchemeオブジェクトは、広告グループ最大入札価格(CPC)の設定情報を表します。
    </div>
    <div lang="en">
    SsaAdGroupServiceCpcBiddingScheme object holds configuration information of max bid of ad group (CPC).
    </div>
