SsaAdGroup:
  type: object
  nullable: true
  properties:
    biddingStrategyConfiguration:
      $ref: 'SsaAdGroupServiceBiddingStrategyConfiguration.yaml#/SsaAdGroupServiceBiddingStrategyConfiguration'
    adGroupId:
      type: integer
      nullable: true
      format: int64
      description: |
        <div lang="ja">広告グループIDです。<br>
        このフィールドは、ADD時は無視され、SETおよびREMOVE時は必須となります。</div>
        <div lang="en">Ad group ID.<br>
        This field will be ignored in ADD operation, and will be required in SET and REMOVE operation.</div>
    adGroupName:
      type: string
      nullable: true
      description: |
        <div lang="ja">広告グループ名です。<br>
        このフィールドは、ADD時は必須となり、SET時は省略可能となります。</div>
        <div lang="en">Ad group name.<br>
        This field is required in ADD operation, and will be optional in SET operation.</div>
    campaignId:
      type: integer
      nullable: true
      format: int64
      description: |
        <div lang="ja">キャンペーンIDです。<br>
        このフィールドは、いずれの場合でも必須となります。</div>
        <div lang="en">Campaign ID.<br>
        This field is required in any cases.</div>
    campaignName:
      type: string
      nullable: true
      description: |
        <div lang="ja">キャンペーン名です。<br>
        このフィールドは、レスポンスの際に返却されますが、リクエストの際には無視されます。</div>
        <div lang="en">Campaign name.<br>
        Although this field will be returned in the response, it will be ignored on input.</div>
    customParameters:
      $ref: 'SsaAdGroupServiceCustomParameters.yaml#/SsaAdGroupServiceCustomParameters'
    trackingUrl:
      type: string
      nullable: true
      description: |
        <div lang="ja">トラッキングURLです。<br>
        このフィールドは、省略可能となります。<br>
        ※SET時、こちらが審査中の場合、編集はできません。また、変更がない場合、審査対象とはなりません。</div>
        <div lang="en">Tracking URL.<br>
        This field is optional.<br>
        *In SET operation, cannot update it when this field is in editorial review. In addition, if there is no change, it will not to be reviewed.</div>
    isRemoveTrackingUrl:
      $ref: 'SsaAdGroupServiceIsRemove.yaml#/SsaAdGroupServiceIsRemove'
    urlReviewData:
      $ref: 'SsaAdGroupServiceUrlReviewData.yaml#/SsaAdGroupServiceUrlReviewData'
    userStatus:
      $ref: 'SsaAdGroupServiceUserStatus.yaml#/SsaAdGroupServiceUserStatus'
    createdDate:
      type: string
      nullable: true
      description: |
        <div lang="ja">広告グループが作成された日です。<br>※フォーマット：yyyy/MM/dd HH:mm:ss</div>
        <div lang="en">Date of ad group made.<br>* Format: yyyy/MM/dd HH:mm:ss</div>
    updatedDate:
      type: string
      nullable: true
      description: |
        <div lang="ja">広告グループが更新された日です。<br>※フォーマット：yyyy/MM/dd HH:mm:ss</div>
        <div lang="en">Date of ad group updated.<br>* Format: yyyy/MM/dd HH:mm:ss</div>
  title: SsaAdGroup
  description: |
    <div lang="ja">SsaAdGroup オブジェクトは、広告グループを表します。</div>
    <div lang="en">SsaAdGroup object describes ad group information.</div>
