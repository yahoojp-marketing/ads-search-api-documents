SsaAdGroupTargetServiceSelector:
  type: object
  nullable: true
  required:
    - accountId
  properties:
    accountId:
      type: integer
      nullable: false
      format: int64
      description: |
        <div lang="ja">検索条件：アカウントIDです。</div>
        <div lang="en">Account ID.</div>
    adGroupIds:
      type: array
      nullable: true
      items:
        type: integer
        nullable: true
        format: int64
      maxItems: 1000
      description: |
        <div lang="ja">検索条件：広告グループIDです。</div>
        <div lang="en">Ad group ID.</div>
    campaignIds:
      type: array
      nullable: true
      items:
        type: integer
        nullable: true
        format: int64
      maxItems: 1000
      description: |
        <div lang="ja">検索条件：キャンペーンIDです。</div>
        <div lang="en">Campaign ID.</div>
    targetTypes:
      type: array
      nullable: true
      items:
        $ref: 'SsaAdGroupTargetServiceTargetType.yaml#/SsaAdGroupTargetServiceTargetType'
    numberResults:
      type: integer
      nullable: true
      format: int32
      minimum: 1
      maximum: 1000
      default: 500
      description: |
        <div lang="ja">開始位置から取得する結果の数です。1以上を指定してください。</div>
        <div lang="en">The number of results to retrieve starting from the initial position. Must be 1 or more.</div>
    startIndex:
      type: integer
      nullable: true
      format: int32
      minimum: 1
      default: 1
      description: |
        <div lang="ja">取得を開始する結果セット内の位置です。1以上を指定してください。</div>
        <div lang="en">The position within the result set where retrieval begins. Must be 1 or more.</div>
  title: SsaAdGroupTargetServiceSelector
  description: |
    <div lang="ja">SsaAdGroupTargetServiceSelectorオブジェクトは、広告グループターゲティング情報の検索条件を保持します。</div>
    <div lang="en">SsaAdGroupTargetServiceSelector object contains search conditions for ad group targeting.</div>
