SsaProductGroupServiceOtherProductGroupSetting:
  type: object
  nullable: true
  properties:
    userStatus:
      $ref: 'SsaProductGroupServiceUserStatus.yaml#/SsaProductGroupServiceUserStatus'
    cpc:
      type: integer
      nullable: true
      format: int64
      description: |
        <div lang="ja">
        商品グループ入札価格（CPC）です。<br>
        配信設定をACTIVEにする場合は必須となります。
        </div>
        <div lang="en">
        Bid of product group (CPC).<br>
        This is required when setting the user status to ACTIVE.
        </div>
    customParameters:
      $ref: 'SsaProductGroupServiceCustomParameters.yaml#/SsaProductGroupServiceCustomParameters'
    trackingUrl:
      type: string
      nullable: true
      description: |
        <div lang="ja">トラッキングURLです。<br>
        このフィールドは、省略可能となります。<br>
        ※SET時、こちらが審査中の場合、編集はできません。また、変更がない場合、審査対象とはなりません。</div>
        <div lang="en">Tracking URL.<br>
        This field is optional.<br>
        *In SET operation, cannot update it when this field is in editorial review. In addition, if there is no change, it will not to be reviewed.</div>
  title: SsaProductGroupServiceProductGroupSettingWithoutType
  description: |
    <div lang="ja">
      SsaProductGroupServiceOtherProductGroupSetting オブジェクトは、その他商品グループ設定を表します。<br>
      その他商品グループに設定した内容はvalueがnullの商品グループとして登録されます。
    </div>
    <div lang="en">
      SsaProductGroupServiceOtherProductGroupSetting object describes other product group setting information.<br>
      The content set in the other product group is registered as a product group with a value of null.
    </div>
