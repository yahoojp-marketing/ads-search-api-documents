SsaProductGroupAddOperand:
  type: object
  nullable: true
  properties:
    campaignId:
      type: integer
      nullable: true
      format: int64
      description: |
        <div lang="ja">キャンペーンIDです。<br>
        このフィールドは、いずれの場合でも必須となります。</div>
        <div lang="en">Campaign ID.<br>
        This field is required in any cases.</div>
    adGroupId:
      type: integer
      nullable: true
      format: int64
      description: |
        <div lang="ja">広告グループIDです。<br>
        このフィールドは、いずれの場合でも必須となります。</div>
        <div lang="en">Ad group ID.<br>
        This field is required in any cases.</div>
    baseProductGroupId:
      type: integer
      nullable: true
      format: int64
      description: |
        <div lang="ja">上位階層の商品グループIDです。<br>
        このフィールドは、ADD時は必須となります。</div>
        <div lang="en">Base product group ID.<br>
        This field is required in ADD operation.</div>
    productGroupSettings:
      type: array
      nullable: true
      items:
        $ref: 'SsaProductGroupServiceProductGroupSettingAdd.yaml#/SsaProductGroupServiceProductGroupSettingAdd'
    otherProductGroupSetting:
      $ref: 'SsaProductGroupServiceOtherProductGroupSetting.yaml#/SsaProductGroupServiceOtherProductGroupSetting'
  title: SsaProductGroupAddOperand
  description: |
    <div lang="ja">SsaProductGroupAddOperand オブジェクトは、商品グループを表します。</div>
    <div lang="en">SsaProductGroupAddOperand object describes product group information.</div>
