SsaCampaignServiceSelector:
  type: object
  nullable: true
  required:
  - accountId
  properties:
    accountId:
      type: integer
      nullable: false
      format: int64
      description: |
        <div lang="ja">検索条件：アカウントIDです。</div>
        <div lang="en">Search condition: Account ID.</div>
    campaignIds:
      type: array
      nullable: true
      items:
        type: integer
        nullable: true
        format: int64
      maxItems: 1000
      description: |
        <div lang="ja">検索条件：キャンペーンIDです。<br>
        ※指定しない場合は、フィルタ条件に すべてのキャンペーンが含まれます。</div>
        <div lang="en">Search condition: SsaCampaign ID<br>
        * All campaign will return, if no campaign are not specified.</div>
    numberResults:
      type: integer
      nullable: true
      format: int32
      minimum: 1
      maximum: 10000
      default: 500
      description: |
        <div lang="ja">開始位置から取得する結果の数。このフィールドは、1以上を指定する必要があります。</div>
        <div lang="en">The number of results to retrieve starting from the initial position. This field must be greater than or equal to 1.</div>
    startIndex:
      type: integer
      nullable: true
      format: int32
      minimum: 1
      default: 1
      description: |
        <div lang="ja">取得を開始する結果セット内の位置。このフィールドは、1以上を指定する必要があります。</div>
        <div lang="en">The position within the result set where retrieval begins. This field must be greater than or equal to 1.</div>
    userStatus:
      $ref: 'SsaCampaignServiceUserStatus.yaml#/SsaCampaignServiceUserStatus'
    budgetAmountRange:
      $ref: 'SsaCampaignServiceBudgetAmountRange.yaml#/SsaCampaignServiceBudgetAmountRange'
  title: SsaCampaignServiceSelector
  description: |
    <div lang="ja">SsaCampaignServiceSelectorオブジェクトは、操作の対象とするキャンペーンの情報およびフィルタ条件を表します。</div>
    <div lang="en">SsaCampaignServiceSelector object displays information and filter criteria of campaign to be operated.</div>
