AudienceListServiceAudienceListOwner:
  type: string
  nullable: true
  enum:
    - OWNER
    - SHARED
    - UNKNOWN
  title: AudienceListServiceAudienceListOwner
  description: |
    <div lang="ja">AudienceListServiceAudienceListOwnerは、オーディエンスリストの所有状態を表します。</div>
    <div lang="en">AudienceListServiceAudienceListOwner describes the owner information of the audience list.</div>
    <dl class=term>
      <dt class="term__item">OWNER</dt>
      <dd class="term__desc"><span lang="ja">アカウントで専有されているオーディエンスリストです。</span><span lang="en">The exclusive audience list owned by an account.</span></dd>
      <dt class="term__item">SHARED</dt>
      <dd class="term__desc">
        <span lang="ja">
          オーディエンスリストグループで共有されているオーディエンスリストです。<br>
          詳細は以下のヘルプを参照してください。<br>
          ・<a href="https://ads-help.yahoo-net.jp/s/article/H000044597?language=ja">オーディエンスリストのアカウント間共有について</a>
        </span>
        <span lang="en">
          The audience list shared by the audience list group.<br>
          See also the help below.<br>
          ・<a href="https://ads-help.yahoo-net.jp/s/article/H000044597?language=en_US">Sharing audience list across accounts</a>
        </span>
      </dd>
      <dt class="term__item">UNKNOWN</dt>
      <dd class="term__desc"><span lang="ja">未知の値です。</span><span lang="en">Unknown value.</span></dd>
    </dl>
