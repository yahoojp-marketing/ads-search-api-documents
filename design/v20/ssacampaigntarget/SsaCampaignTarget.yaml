SsaCampaignTarget:
  type: object
  nullable: true
  properties:
    bidMultiplier:
      type: number
      nullable: true
      format: double
      description: |
        <div lang="ja">
          入札価格調整率です。0.10～10.00まで指定できます。<br>
          targetTypeが"DEVICE"の場合、0を指定可能です。
          0を指定した場合、広告は配信されません。<br>
          また、入札価格調整率の値は小数点第二位まで指定可能です。<br>
          このフィールドは省略可能となります。その際、デフォルト設定値は1.0となります。
        </div>
        <div lang="en">
          Bid adjustment rate.<br>
          Can be specified between  0.10 to 10.00.<br>
          When targetType is "DEVICE", you can specify &#39;0&#39;.<br>
          When specified &#39;0&#39;, the ad will not be delivered.<br>
          Bid adjustment rate can be specified up to two decimal places.<br>
          This field is optional. The default value will be 1.0.
        </div>
    campaignId:
      type: integer
      nullable: true
      format: int64
      description: |
        <div lang="ja">キャンペーンIDです。<br>
        SET時、このフィールドは必須となります。</div>
        <div lang="en">Campaign ID.<br>
        This field is required in SET operation.</div>
    target:
      $ref: 'SsaCampaignTargetServiceTarget.yaml#/SsaCampaignTargetServiceTarget'
  title: SsaCampaignTarget
  description: |
    <div lang="ja">SsaCampaignTargetオブジェクトは、キャンペーンの各種ターゲティング設定を表します。</div>
    <div lang="en">SsaCampaignTarget describes each type of targeting setting of Campaign.</div>
