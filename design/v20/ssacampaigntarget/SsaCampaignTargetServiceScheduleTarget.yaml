SsaCampaignTargetServiceScheduleTarget:
  type: object
  nullable: true
  properties:
    dayOfWeek:
      $ref: 'SsaCampaignTargetServiceDayOfWeek.yaml#/SsaCampaignTargetServiceDayOfWeek'
    endHour:
      type: integer
      nullable: true
      format: int32
      description: |
        <div lang="ja">24時間表示の終了時刻です。<br>このフィールドは、REPLACE時に必須となります。</div>
        <div lang="en">Ending hour in 24 hour time.<br>This field is required in REPLACE operation.</div>
    endMinute:
      $ref: 'SsaCampaignTargetServiceMinuteOfHour.yaml#/SsaCampaignTargetServiceMinuteOfHour'
    startHour:
      type: integer
      nullable: true
      format: int32
      description: |
        <div lang="ja">24時間表示の開始時刻です。<br>このフィールドは、REPLACE時に必須となります。</div>
        <div lang="en">Starting hour in 24 hour time.<br>This field is required in REPLACE operation.</div>
    startMinute:
      $ref: 'SsaCampaignTargetServiceMinuteOfHour.yaml#/SsaCampaignTargetServiceMinuteOfHour'
  title: SsaCampaignTargetServiceScheduleTarget
  description: |
    <div lang="ja">SsaCampaignTargetServiceScheduleTargetオブジェクトは、曜日・時間帯ターゲティングレポートを表します。<br>
    このフィールドは、REPLACE時およびSET時に省略可能となります。<br>
    ※targetTypeがSCHEDULEの場合、このフィールドはREPLACE時に必須となります。</div>
    <div lang="en">SsaCampaignTargetServiceScheduleTarget describes Day of week/Hour targeting report.<br>
    *This field is optional in REPLACE and SET operation.<br>
    If targetType is SCHEDULE, this field is required in REPLACE operation.</div>
